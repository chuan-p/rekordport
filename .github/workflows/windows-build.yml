name: build-windows-exe

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Download Windows sidecars
        shell: pwsh
        run: ./tools/fetch-windows-sidecars.ps1

      - name: Run project checks
        run: npm run check

      - name: Build Windows release
        run: npm run tauri build -- --bundles nsis

      - name: Locate portable executable
        id: portable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "rekordport.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "No portable .exe was produced."
          }

          "exe_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "exe_name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Rename portable executable for release
        id: portable_release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $buildDate = Get-Date -Format "yyyy-MM-dd"
          $releaseName = "rekordport-windows-portable-$version-$buildDate.exe"
          $releaseDir = Join-Path $PWD "release"
          $releasePath = Join-Path $releaseDir $releaseName

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item "${{ steps.portable.outputs.exe_path }}" $releasePath -Force

          "release_path=$releasePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Smoke test portable executable
        shell: pwsh
        run: |
          $exe = "${{ steps.portable.outputs.exe_path }}"
          $proc = $null

          try {
            $proc = Start-Process -FilePath $exe -PassThru
            Start-Sleep -Seconds 10
            $proc.Refresh()

            if ($proc.HasExited) {
              throw "Portable executable exited too early with code $($proc.ExitCode)."
            }
          }
          finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
              Wait-Process -Id $proc.Id -Timeout 10 -ErrorAction SilentlyContinue
            }
          }

      - name: Upload Windows portable executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.portable_release.outputs.release_name }}
          path: |
            ${{ steps.portable_release.outputs.release_path }}

      - name: Add build summary
        shell: pwsh
        run: |
          @"
          ## Windows portable build ready

          - Portable executable: `${{ steps.portable_release.outputs.release_name }}`
          - Ref: `${{ github.ref_name }}`
          - Run: `${{ github.run_number }}`
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Attach portable executable to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = "${{ steps.portable_release.outputs.release_path }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated Windows portable executable build."
          }

          gh release delete-asset $tag "rekordport.exe" --yes *> $null
          gh release upload $tag $exe --clobber
